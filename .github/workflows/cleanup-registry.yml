name: Cleanup Container Registry

on:
  workflow_dispatch:
    inputs:
      keep_count:
        description: 'Number of images to keep per repository'
        required: true
        default: '3'
        type: string
      dry_run:
        description: 'Dry run (show what would be deleted without deleting)'
        required: true
        default: true
        type: boolean
      image_name:
        description: 'Image name to clean (leave empty for all images)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: cr.yandex

jobs:
  cleanup:
    name: Cleanup Old Container Images
    runs-on: ubuntu-latest

    steps:
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure Yandex Cloud CLI
        run: |
          echo '${{ secrets.YC_SA_JSON_KEY }}' > key.json
          yc config profile create github-actions-cleanup
          yc config set service-account-key key.json
          rm key.json

      - name: List current images
        run: |
          echo "Current repositories in registry:"
          echo ""
          REGISTRY_ID="${{ secrets.YC_REGISTRY_ID }}"
          for REPO in $(yc container repository list --registry-id "$REGISTRY_ID" --format json | jq -r '.[].name'); do
            COUNT=$(yc container image list --repository-name "$REGISTRY_ID/$REPO" --format json | jq 'length')
            echo "  $REPO: $COUNT images"
          done

      - name: Cleanup images
        run: |
          KEEP_COUNT=${{ inputs.keep_count }}
          DRY_RUN=${{ inputs.dry_run }}
          IMAGE_FILTER="${{ inputs.image_name }}"
          REGISTRY_ID="${{ secrets.YC_REGISTRY_ID }}"

          echo "Container Registry Cleanup"
          echo "=============================="
          echo "Keep count: $KEEP_COUNT"
          echo "Dry run: $DRY_RUN"
          echo "Image filter: ${IMAGE_FILTER:-all images}"
          echo ""

          if [ -n "$IMAGE_FILTER" ]; then
            REPOS="$IMAGE_FILTER"
          else
            REPOS=$(yc container repository list \
              --registry-id "$REGISTRY_ID" \
              --format json | jq -r '.[].name')
          fi

          if [ -z "$REPOS" ]; then
            echo "No repositories found"
            exit 0
          fi

          TOTAL_DELETED=0

          for REPO in $REPOS; do
            echo ""
            echo "Processing: $REPO"
            echo "-------------------"

            REPO_NAME="$REGISTRY_ID/$REPO"
            IMAGES=$(yc container image list \
              --repository-name "$REPO_NAME" \
              --format json | \
              jq -r 'sort_by(.createdAt) | reverse | .[].id')

            if [ -z "$IMAGES" ]; then
              echo "  No images found"
              continue
            fi

            IMAGE_ARRAY=($IMAGES)
            TOTAL=${#IMAGE_ARRAY[@]}
            echo "  Total images: $TOTAL"

            if [ $TOTAL -le $KEEP_COUNT ]; then
              echo "  Nothing to delete (count <= keep threshold)"
              continue
            fi

            DELETE_COUNT=$((TOTAL - KEEP_COUNT))
            echo "  Images to delete: $DELETE_COUNT"

            for ((i=KEEP_COUNT; i<TOTAL; i++)); do
              IMAGE_ID=${IMAGE_ARRAY[$i]}

              if [ "$DRY_RUN" = "true" ]; then
                echo "  [DRY RUN] Would delete: $IMAGE_ID"
              else
                echo "  Deleting: $IMAGE_ID"
                if yc container image delete "$IMAGE_ID" 2>/dev/null; then
                  ((TOTAL_DELETED++))
                else
                  echo "  Failed to delete: $IMAGE_ID"
                fi
              fi
            done
          done

          echo ""
          echo "=============================="
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run complete - no images were deleted"
          else
            echo "Cleanup complete - deleted $TOTAL_DELETED images"
          fi

      - name: Show final state
        if: ${{ inputs.dry_run == false }}
        run: |
          echo ""
          echo "Remaining images:"
          REGISTRY_ID="${{ secrets.YC_REGISTRY_ID }}"
          for REPO in $(yc container repository list --registry-id "$REGISTRY_ID" --format json | jq -r '.[].name'); do
            COUNT=$(yc container image list --repository-name "$REGISTRY_ID/$REPO" --format json | jq 'length')
            echo "  $REPO: $COUNT images"
          done
