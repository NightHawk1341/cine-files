name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: cinefiles-app

jobs:
  build-and-deploy:
    name: Build and Deploy to Yandex Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: json_key
          password: ${{ secrets.YC_SA_JSON_KEY }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure Yandex Cloud CLI
        run: |
          echo '${{ secrets.YC_SA_JSON_KEY }}' > key.json
          yc config profile create github-actions
          yc config set service-account-key key.json
          rm key.json

      - name: Deploy to Yandex Cloud Container
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest"

          yc serverless container revision deploy \
            --container-id ${{ secrets.YC_CONTAINER_ID }} \
            --image $IMAGE_URL \
            --cores 1 \
            --memory 512MB \
            --concurrency 16 \
            --execution-timeout 60s \
            --service-account-id ${{ secrets.YC_SERVICE_ACCOUNT_ID }} \
            --environment NODE_ENV=production \
            --environment APP_URL=${{ secrets.APP_URL }} \
            --environment DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --environment JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --environment SESSION_SECRET=${{ secrets.SESSION_SECRET }} \
            --environment CRON_SECRET=${{ secrets.CRON_SECRET }} \
            --environment YANDEX_CLIENT_ID=${{ secrets.YANDEX_CLIENT_ID }} \
            --environment YANDEX_CLIENT_SECRET=${{ secrets.YANDEX_CLIENT_SECRET }} \
            --environment VK_CLIENT_ID=${{ secrets.VK_CLIENT_ID }} \
            --environment VK_CLIENT_SECRET=${{ secrets.VK_CLIENT_SECRET }} \
            --environment TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} \
            --environment TELEGRAM_BOT_ID=${{ secrets.TELEGRAM_BOT_ID }} \
            --environment YANDEX_S3_ENDPOINT=${{ secrets.YANDEX_S3_ENDPOINT }} \
            --environment YANDEX_S3_REGION=${{ secrets.YANDEX_S3_REGION }} \
            --environment YANDEX_S3_BUCKET=${{ secrets.YANDEX_S3_BUCKET }} \
            --environment YANDEX_S3_ACCESS_KEY=${{ secrets.YANDEX_S3_ACCESS_KEY }} \
            --environment YANDEX_S3_SECRET_KEY=${{ secrets.YANDEX_S3_SECRET_KEY }} \
            --environment TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --environment TMDB_PROXY_URL=${{ secrets.TMDB_PROXY_URL }} \
            --environment TMDB_PROXY_SECRET=${{ secrets.TMDB_PROXY_SECRET }} \
            --environment TRIBUTE_API_URL=${{ secrets.TRIBUTE_API_URL }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed. Check the logs above for details."
          exit 1
