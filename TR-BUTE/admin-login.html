<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="" id="canonical-url">
  <title>Admin Login - TR/BUTE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #e3b96f;
      --primary-hover: #d4a962;
      --bg-primary: #191919;
      --bg-secondary: #1f1f1f;
      --text-primary: #ffffff;
      --text-secondary: #9b9b9b;
      --border-color: rgba(255, 255, 255, 0.08);
      --error: #f87171;
      --error-bg: rgba(248, 113, 113, 0.1);
      --radius-md: 6px;
      --radius-lg: 8px;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --shadow-lg: 0 8px 16px rgba(0, 0, 0, 0.6);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--spacing-md);
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-lg);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 0.875rem;
      background: var(--primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-message {
      background: var(--error-bg);
      color: var(--error);
      padding: 0.75rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      margin-bottom: var(--spacing-lg);
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--bg-primary);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .security-note {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(227, 185, 111, 0.05);
      border: 1px solid rgba(227, 185, 111, 0.1);
      border-radius: var(--radius-md);
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>TR/BUTE Admin</h1>
      <p>Вход в панель администратора</p>
    </div>

    <div id="error-message" class="error-message"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username" class="form-label">Имя пользователя</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input"
          required
          autocomplete="username"
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Пароль</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn" id="login-btn">
        Войти
      </button>
    </form>

    <div class="security-note">
      🔒 Защищенное подключение
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    const loginBtn = document.getElementById('login-btn');

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    function hideError() {
      errorMessage.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Disable button and show loading
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="loading-spinner"></span>';

      try {
        const response = await fetch('/api/admin/browser-login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Login successful, redirect to admin page
          window.location.href = '/admin-miniapp/';
        } else {
          showError(data.message || 'Неверное имя пользователя или пароль');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Войти';
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('Ошибка при входе. Попробуйте позже.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
